name: Textlint (reusable)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  textlint:
    name: Prose Lint (Japanese)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: docker compose -f compose.ci.yaml run --rm textlint
