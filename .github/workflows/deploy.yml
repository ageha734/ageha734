name: Deploy GAS

on:
  push:
    branches:
      - master
    paths:
      - "cv-api/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-test:
    name: Unit Tests
    uses: ./.github/workflows/_reusable-cv-api-unit-test.yml

  integration-test:
    name: Integration Tests
    uses: ./.github/workflows/_reusable-cv-api-integration-test.yml

  deploy:
    name: Deploy to Google Apps Script
    needs: [unit-test, integration-test]
    runs-on: ubuntu-latest
    outputs:
      previous-version: ${{ steps.get-version.outputs.previous-version }}
    defaults:
      run:
        working-directory: cv-api
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - run: pnpm install --frozen-lockfile

      - name: Set up clasp credentials
        run: echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Write .clasp.json
        run: |
          echo '{"scriptId":"${{ secrets.GAS_SCRIPT_ID }}","rootDir":"."}' > .clasp.json

      - name: Get current deployment version
        id: get-version
        run: |
          DEPLOYMENTS=$(pnpx @google/clasp deployments 2>/dev/null || echo "")
          PREV_VERSION=$(echo "$DEPLOYMENTS" | grep -oP '(?<=@)\d+' | sort -n | tail -1 || echo "")
          echo "previous-version=${PREV_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Push to GAS
        run: pnpx @google/clasp push --force

  e2e-test:
    name: E2E Scenario Tests
    needs: deploy
    uses: ./.github/workflows/_reusable-e2e-test.yml
    secrets: inherit

  rollback:
    name: Rollback on E2E failure
    needs: [deploy, e2e-test]
    if: failure() && needs.e2e-test.result == 'failure' && needs.deploy.outputs.previous-version != ''
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cv-api
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - run: pnpm install --frozen-lockfile

      - name: Set up clasp credentials
        run: echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Write .clasp.json
        run: |
          echo '{"scriptId":"${{ secrets.GAS_SCRIPT_ID }}","rootDir":"."}' > .clasp.json

      - name: Rollback to previous version
        run: |
          echo "Rolling back to version ${{ needs.deploy.outputs.previous-version }}"
          pnpx @google/clasp deploy --versionNumber "${{ needs.deploy.outputs.previous-version }}" --description "rollback from failed E2E"
