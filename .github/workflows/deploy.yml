name: Deploy GAS

on:
  push:
    branches:
      - master
    paths:
      - "cv-api/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test before deploy
    uses: ./.github/workflows/_reusable-cv-api-test.yml

  deploy:
    name: Deploy to Google Apps Script
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cv-api
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - run: pnpm install --frozen-lockfile

      - name: Set up clasp credentials
        run: echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Write .clasp.json
        run: |
          echo '{"scriptId":"${{ secrets.GAS_SCRIPT_ID }}","rootDir":"."}' > .clasp.json

      - name: Push to GAS
        run: pnpx @google/clasp push --force
