name: Deploy GAS

on:
  push:
    branches:
      - master
    paths:
      - "cv-api/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-test:
    name: Unit Tests
    uses: ./.github/workflows/_reusable-cv-api-unit-test.yml

  integration-test:
    name: Integration Tests
    uses: ./.github/workflows/_reusable-cv-api-integration-test.yml

  build:
    name: Build
    needs: [unit-test, integration-test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cv-api
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gas-dist
          path: |
            cv-api/dist/Code.js
            cv-api/appsscript.json
          retention-days: 1

  deploy:
    name: Deploy to Google Apps Script
    needs: build
    runs-on: ubuntu-latest
    outputs:
      previous-version: ${{ steps.get-version.outputs.previous-version }}
      gas-api-url: ${{ steps.get-url.outputs.gas-api-url }}
    steps:
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: gas-dist
          path: cv-api

      - name: Set up clasp credentials
        run: echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Write .clasp.json
        run: |
          echo '{"scriptId":"${{ secrets.GAS_SCRIPT_ID }}","rootDir":"cv-api"}' > cv-api/.clasp.json

      - name: Get current deployment version
        id: get-version
        working-directory: cv-api
        run: |
          DEPLOYMENTS=$(pnpx @google/clasp deployments 2>/dev/null || echo "")
          PREV_VERSION=$(echo "$DEPLOYMENTS" | grep -oP '(?<=@)\d+' | sort -n | tail -1 || echo "")
          echo "previous-version=${PREV_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Push to GAS
        working-directory: cv-api
        run: pnpx @google/clasp push --force

      - name: Resolve deployment URL
        id: get-url
        working-directory: cv-api
        run: |
          DEPLOYMENT_ID=$(pnpx @google/clasp deployments 2>/dev/null \
            | grep -oP '(?<=- )[A-Za-z0-9_-]+(?= @)' \
            | tail -1)
          echo "gas-api-url=https://script.google.com/macros/s/${DEPLOYMENT_ID}/exec" >> "$GITHUB_OUTPUT"

  e2e-test:
    name: E2E Tests
    needs: deploy
    uses: ./.github/workflows/_reusable-e2e-test.yml
    with:
      gas-api-url: ${{ needs.deploy.outputs.gas-api-url }}
      portfolio-url: https://ageha734.github.io/ageha734/
    secrets:
      GAS_HMAC_SECRET: ${{ secrets.GAS_HMAC_SECRET }}

  rollback:
    name: Rollback on E2E failure
    needs: [deploy, e2e-test]
    if: failure() && needs.e2e-test.result == 'failure' && needs.deploy.outputs.previous-version != ''
    runs-on: ubuntu-latest
    steps:
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Set up clasp credentials
        run: echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Write .clasp.json
        run: |
          echo '{"scriptId":"${{ secrets.GAS_SCRIPT_ID }}","rootDir":"."}' > .clasp.json

      - name: Rollback to previous version
        run: |
          echo "Rolling back to version ${{ needs.deploy.outputs.previous-version }}"
          pnpx @google/clasp deploy --versionNumber "${{ needs.deploy.outputs.previous-version }}" --description "rollback from failed E2E"
