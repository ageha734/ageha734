name: Security (reusable)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Run gitleaks via Docker
        run: |
          docker compose -f compose.ci.yaml run --rm gitleaks

  osv-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run osv-scanner via Docker
        run: |
          docker compose -f compose.ci.yaml run --rm osv-scanner
