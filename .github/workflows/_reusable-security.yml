name: Security (reusable)

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Run gitleaks via Docker
        run: |
          docker compose -f compose.ci.yaml run --rm gitleaks

  osv-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run osv-scanner via Docker
        run: |
          docker compose -f compose.ci.yaml run --rm osv-scanner
