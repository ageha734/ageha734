name: Check Stale Links

on:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check links in Markdown files
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: >
            --no-progress
            --exclude-loopback
            --exclude-private
            --timeout 20
            --max-retries 3
            --accept 200,204,301,302,403,429
            README.md README.ja.md about/README.md about/README.ja.md
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue for broken links
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔗 Broken links detected in README files',
              body: 'The weekly link checker found broken links. Please review the workflow run for details.',
              labels: ['maintenance']
            })
