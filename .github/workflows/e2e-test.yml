name: E2E Tests

on:
  push:
    paths:
      - "cv-api/**"
      - "e2e/**"
      - "compose.e2e.yml"
  pull_request:
    paths:
      - "cv-api/**"
      - "e2e/**"
      - "compose.e2e.yml"
  workflow_dispatch:

jobs:
  e2e-test:
    name: E2E Tests
    uses: ./.github/workflows/_reusable-e2e-test.yml
    with:
      gas-api-url: ""
    secrets:
      GAS_HMAC_SECRET: ${{ secrets.GAS_HMAC_SECRET }}
