name: Validate Profile

on:
  pull_request:
    paths:
      - "data/profile.json"
      - "templates/**"
      - "scripts/update-readme.js"
      - "docs/**"
  push:
    branches:
      - master
    paths:
      - "data/profile.json"
      - "templates/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4.1.0
        with:
          version: "10"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate profile.json
        run: node scripts/validate-profile.js

      - name: Validate templates render without error
        run: node scripts/validate-templates.js

      - name: Lint Markdown
        run: pnpm exec markdownlint-cli2 "**/*.md" "#node_modules" "#docs" || true
