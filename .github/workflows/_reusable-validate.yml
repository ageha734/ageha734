name: Validate (reusable)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  validate:
    name: Validate profile & templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4.1.0
        with:
          version: "10"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate profile.json
        run: pnpm validate:profile

      - name: Validate templates
        run: pnpm validate:templates
