name: Generate README

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    paths:
      - "data/profile.json"
      - "templates/**"
      - "scripts/update-readme.ts"
      - "scripts/generate-portfolio.ts"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: "10"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Generate README files
        run: pnpm tsx scripts/update-readme.ts

      - name: Generate portfolio
        run: pnpm tsx scripts/generate-portfolio.ts

      - name: Commit and push changes
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        with:
          author_name: "GitHub Actions"
          author_email: "41898282+github-actions[bot]@users.noreply.github.com"
          message: "chore: regenerate README and portfolio from profile.json"
          add: "README.md README.ja.md docs/index.html"
