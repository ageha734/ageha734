name: Sync Profile from Google Sheets (GAS)

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up clasp credentials
        working-directory: cv-api
        run: echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Write .clasp.json
        working-directory: cv-api
        run: |
          echo '{"scriptId":"${{ secrets.GAS_SCRIPT_ID }}","rootDir":"."}' > .clasp.json

      - name: Resolve GAS deployment URL
        working-directory: cv-api
        run: |
          DEPLOYMENT_ID=$(pnpx @google/clasp deployments 2>/dev/null \
            | grep -oP '(?<=- )[A-Za-z0-9_-]+(?= @)' \
            | tail -1)
          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "No deployment found — skipping sync"
            echo "GAS_API_URL=" >> "$GITHUB_ENV"
          else
            echo "GAS_API_URL=https://script.google.com/macros/s/${DEPLOYMENT_ID}/exec" >> "$GITHUB_ENV"
          fi

      - name: Fetch data from GAS API and update profile.json
        run: pnpm tsx scripts/sync-from-gas.ts
        env:
          GAS_HMAC_SECRET: ${{ secrets.GAS_HMAC_SECRET }}

      - name: Regenerate README from updated profile
        run: pnpm tsx scripts/update-readme.ts

      - name: Commit changes if any
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        with:
          author_name: "GitHub Actions"
          author_email: "41898282+github-actions[bot]@users.noreply.github.com"
          message: "chore: sync profile data from Google Sheets"
          add: "data/profile.json README.md README.ja.md"
