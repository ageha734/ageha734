name: Markdownlint (reusable)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  markdownlint:
    name: Markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: docker compose -f compose.ci.yaml run --rm markdownlint
