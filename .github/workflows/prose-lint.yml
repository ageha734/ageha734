name: Prose Lint

on:
  pull_request:
    paths:
      - "**/*.md"
      - "about/**"
  push:
    branches:
      - master
    paths:
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typos:
    name: Spell Check (English)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: crate-ci/typos@5374cbf686e897b15713110e233094e2874de7ef # v1.46.1
        with:
          files: "README.md about/README.md docs/"

  textlint:
    name: Prose Lint (Japanese)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4.1.0
        with:
          version: "10"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Run textlint on Japanese Markdown
        run: pnpm exec textlint "README.ja.md" "about/README.ja.md" || true

  actionlint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2
