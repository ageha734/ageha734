name: E2E Test (reusable)

on:
  workflow_call:
    inputs:
      gas-api-url:
        required: false
        type: string
        default: ""
      portfolio-url:
        required: false
        type: string
        default: ""
    secrets:
      GAS_HMAC_SECRET:
        required: true

permissions:
  contents: read

jobs:
  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Start services and transfer files
        run: |
          docker compose -f compose.e2e.yml up --build -d cv-api sync portfolio
          docker compose -f compose.e2e.yml --profile setup run --rm setup
        env:
          GAS_API_URL: ${{ inputs.gas-api-url }}
          GAS_HMAC_SECRET: ${{ secrets.GAS_HMAC_SECRET }}
          PORTFOLIO_URL: ${{ inputs.portfolio-url }}

      - name: Run E2E tests
        run: docker compose -f compose.e2e.yml up --no-recreate --abort-on-container-exit --exit-code-from e2e e2e
        env:
          GAS_API_URL: ${{ inputs.gas-api-url }}
          GAS_HMAC_SECRET: ${{ secrets.GAS_HMAC_SECRET }}
          PORTFOLIO_URL: ${{ inputs.portfolio-url }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
