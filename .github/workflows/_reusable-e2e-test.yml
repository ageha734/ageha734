name: E2E Test (reusable)

on:
  workflow_call:
    inputs:
      gas-api-url:
        required: true
        type: string
      portfolio-url:
        required: false
        type: string
        default: ""
    secrets:
      GAS_HMAC_SECRET:
        required: true

permissions:
  contents: read

jobs:
  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright@sha256:a021500a801bab0611049217ffad6b9697d827205c15babb86a53bc1a61c02d5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - run: pnpm install --frozen-lockfile

      - name: Run Playwright E2E tests
        run: pnpm --filter e2e exec playwright test
        env:
          GAS_API_URL: ${{ inputs.gas-api-url }}
          GAS_HMAC_SECRET: ${{ secrets.GAS_HMAC_SECRET }}
          PORTFOLIO_URL: ${{ inputs.portfolio-url }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
