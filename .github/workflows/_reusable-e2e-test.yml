name: CV API E2E Test (reusable)

on:
  workflow_call:
    secrets:
      GAS_API_URL:
        required: true
      GAS_HMAC_SECRET:
        required: true

permissions:
  contents: read

jobs:
  e2e-test:
    name: E2E Tests (cv-api)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cv-api
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - run: pnpm install --frozen-lockfile

      - name: Run E2E scenario tests against deployed GAS
        run: pnpm test:e2e
        env:
          GAS_API_URL: ${{ secrets.GAS_API_URL }}
          GAS_HMAC_SECRET: ${{ secrets.GAS_HMAC_SECRET }}
