<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API reference</title>
    <meta name="description" content="API reference" />
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.32.6/swagger-ui.css" integrity="sha384-9Q2fpS+xeS4ffJy6CagnwoUl+4ldAYhOs9pgZuEKxypVModhmZFzeMlvVsAjf7uT" crossorigin="anonymous" />
    <style>
      .custom-header {
        padding: 16px 24px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .custom-header a {
        font-family: sans-serif;
        font-size: 14px;
        text-decoration: none;
      }
      .custom-header a:hover { text-decoration: underline; }
      .custom-header span { color: #8b949e; font-family: sans-serif; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="custom-header">
      <a href="/">← Home</a>
      <span>/</span>
      <span>API reference</span>
    </div>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5.32.6/swagger-ui-bundle.js" integrity="sha384-EYdOaiRwn44zNjrw+Tfs06qYz9BGQVo2f4/pLY5i7VorbjnZNhdplAbTBk8FXHUJ" crossorigin="anonymous"></script>
    <script>
      SwaggerUIBundle({
        url: './openapi.yaml',
        dom_id: '#swagger-ui',
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
        layout: 'BaseLayout',
        deepLinking: true,
        displayOperationId: false,
        defaultModelsExpandDepth: 1,
        defaultModelExpandDepth: 1,
        docExpansion: 'list',
      })
    </script>
  </body>
</html>
