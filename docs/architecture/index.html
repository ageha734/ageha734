<!doctype html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Architecture</title>
    <meta name="description" content="System architecture diagram" />
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: sans-serif; background: #f6f8fa; }
        .header {
            padding: 12px 24px;
            background: #fff;
            border-bottom: 1px solid #d0d7de;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .header a { color: #0969da; text-decoration: none; }
        .header a:hover { text-decoration: underline; }
        .header span { color: #8b949e; }
        .diagram-container {
            width: 100%;
            height: calc(100vh - 45px);
        }
        .diagram-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/">← Home</a>
        <span>/</span>
        <span>Architecture</span>
        <span>/</span>
        <a href="../openapi/">API Docs</a>
        <span>/</span>
        <a href="../sequence/">Sequence</a>
    </div>
    <div class="diagram-container">
        <iframe
            id="diagram-frame"
            src="https://embed.diagrams.net/?embed=1&spin=1&proto=json&nav=1&fit=1"
            title="Architecture diagram"
        ></iframe>
    </div>

    <script>
      var diagramXml = `<mxfile><diagram name="Architecture" id="architecture"><mxGraphModel dx="1422" dy="762" grid="1" gridSize="10" guides="1" tooltips="1" connect="1" arrows="1" fold="1" page="1" pageScale="1" pageWidth="1654" pageHeight="1169" math="0" shadow="0"><root><mxCell id="0" /><mxCell id="1" parent="0" /><mxCell id="gcp-group" value="Google Cloud" style="points=[[0,0],[0.25,0],[0.5,0],[0.75,0],[1,0],[1,0.25],[1,0.5],[1,0.75],[1,1],[0.75,1],[0.5,1],[0.25,1],[0,1],[0,0.75],[0,0.5],[0,0.25]];shape=mxgraph.gcp2.group;grIcon=mxgraph.gcp2.group_google_cloud;strokeColor=#C3D9EC;fillColor=#E6F2FA;fontStyle=1;fontSize=13;verticalAlign=top;align=left;spacingLeft=36;grStroke=0;swimlaneHead=0;swimlaneBody=0;strokeWidth=2;" vertex="1" parent="1"><mxGeometry x="80" y="80" width="400" height="280" as="geometry" /></mxCell><mxCell id="sheets" value="Google Sheets&#xa;(職務経歴書データ)" style="shape=mxgraph.gcp2.sheets;fillColor=#AECBFA;strokeColor=none;labelBackgroundColor=none;align=center;fontSize=12;" vertex="1" parent="gcp-group"><mxGeometry x="60" y="80" width="120" height="100" as="geometry" /></mxCell><mxCell id="gas" value="CV Data API&#xa;(Google Apps Script)" style="shape=mxgraph.gcp2.app_engine;fillColor=#AECBFA;strokeColor=none;labelBackgroundColor=none;align=center;fontSize=12;" vertex="1" parent="gcp-group"><mxGeometry x="240" y="80" width="120" height="100" as="geometry" /></mxCell><mxCell id="gas-sheets-arrow" value="スプレッドシート読み込み" style="edgeStyle=orthogonalEdgeStyle;rounded=0;orthogonalLoop=1;jettySize=auto;exitX=1;exitY=0.5;exitDx=0;exitDy=0;entryX=0;entryY=0.5;entryDx=0;entryDy=0;fontSize=11;" edge="1" parent="gcp-group" source="sheets" target="gas"><mxGeometry relative="1" as="geometry" /></mxCell><mxCell id="github-group" value="GitHub" style="points=[[0,0],[0.25,0],[0.5,0],[0.75,0],[1,0],[1,0.25],[1,0.5],[1,0.75],[1,1],[0.75,1],[0.5,1],[0.25,1],[0,1],[0,0.75],[0,0.5],[0,0.25]];shape=mxgraph.gcp2.group;strokeColor=#D5E8D4;fillColor=#F0FAF0;fontStyle=1;fontSize=13;verticalAlign=top;align=left;spacingLeft=16;swimlaneHead=0;swimlaneBody=0;strokeWidth=2;" vertex="1" parent="1"><mxGeometry x="560" y="80" width="980" height="700" as="geometry" /></mxCell><mxCell id="repo-group" value="Repository (ageha734/ageha734)" style="rounded=1;arcSize=4;strokeColor=#82B366;fillColor=#D5E8D4;fontSize=12;fontStyle=1;verticalAlign=top;align=left;spacingLeft=12;" vertex="1" parent="github-group"><mxGeometry x="40" y="60" width="440" height="580" as="geometry" /></mxCell><mxCell id="profile-json" value="data/profile.json" style="shape=mxgraph.general.file2;fillColor=#fff2cc;strokeColor=#d6b656;fontSize=12;" vertex="1" parent="repo-group"><mxGeometry x="60" y="80" width="100" height="80" as="geometry" /></mxCell><mxCell id="templates" value="templates/" style="shape=mxgraph.general.folder;fillColor=#dae8fc;strokeColor=#6c8ebf;fontSize=12;" vertex="1" parent="repo-group"><mxGeometry x="60" y="220" width="100" height="70" as="geometry" /></mxCell><mxCell id="readme-md" value="README.md&#xa;README.ja.md" style="shape=mxgraph.general.file2;fillColor=#f8cecc;strokeColor=#b85450;fontSize=12;" vertex="1" parent="repo-group"><mxGeometry x="240" y="80" width="100" height="80" as="geometry" /></mxCell><mxCell id="docs-html" value="docs/index.html&#xa;(Portfolio)" style="shape=mxgraph.general.file2;fillColor=#f8cecc;strokeColor=#b85450;fontSize=12;" vertex="1" parent="repo-group"><mxGeometry x="240" y="220" width="100" height="80" as="geometry" /></mxCell><mxCell id="actions-group" value="GitHub Actions" style="rounded=1;arcSize=4;strokeColor=#6c8ebf;fillColor=#dae8fc;fontSize=12;fontStyle=1;verticalAlign=top;align=left;spacingLeft=12;" vertex="1" parent="github-group"><mxGeometry x="540" y="60" width="400" height="580" as="geometry" /></mxCell><mxCell id="sync-workflow" value="sync-from-gas.yml&#xa;毎日 05:00 JST&#xa;/ 手動実行" style="rounded=1;arcSize=8;fillColor=#fff2cc;strokeColor=#d6b656;fontSize=12;" vertex="1" parent="actions-group"><mxGeometry x="40" y="80" width="160" height="100" as="geometry" /></mxCell><mxCell id="generate-workflow" value="generate-readme.yml&#xa;profile.json 変更時&#xa;/ 毎日 06:00 JST" style="rounded=1;arcSize=8;fillColor=#fff2cc;strokeColor=#d6b656;fontSize=12;" vertex="1" parent="actions-group"><mxGeometry x="220" y="80" width="160" height="100" as="geometry" /></mxCell><mxCell id="other-workflows" value="その他 Workflows&#xa;・blog-post-sync&#xa;・github-metrics&#xa;・lapras-card&#xa;・security-scan" style="rounded=1;arcSize=8;fillColor=#f5f5f5;strokeColor=#666666;fontSize=11;" vertex="1" parent="actions-group"><mxGeometry x="100" y="320" width="200" height="120" as="geometry" /></mxCell><mxCell id="pages" value="GitHub Pages&#xa;(mypages.ageha734.jp)" style="shape=mxgraph.gcp2.cdn;fillColor=#A8D5A2;strokeColor=none;labelBackgroundColor=none;align=center;fontSize=12;" vertex="1" parent="github-group"><mxGeometry x="740" y="200" width="160" height="120" as="geometry" /></mxCell><mxCell id="developer" value="Developer&#xa;(ageha734)" style="shape=mxgraph.general.user;fillColor=#f5f5f5;strokeColor=#666666;fontSize=12;" vertex="1" parent="1"><mxGeometry x="80" y="460" width="80" height="100" as="geometry" /></mxCell><mxCell id="visitor" value="Visitor" style="shape=mxgraph.general.user;fillColor=#f5f5f5;strokeColor=#666666;fontSize=12;" vertex="1" parent="1"><mxGeometry x="1620" y="360" width="80" height="100" as="geometry" /></mxCell><mxCell id="arrow-sync-gas" value="HMAC 署名付きリクエスト" style="edgeStyle=orthogonalEdgeStyle;rounded=0;fontSize=11;exitX=1;exitY=0.5;exitDx=0;exitDy=0;" edge="1" parent="1" source="gas" target="sync-workflow"><mxGeometry relative="1" as="geometry" /></mxCell><mxCell id="arrow-sync-profile" value="profile.json を更新" style="edgeStyle=orthogonalEdgeStyle;rounded=0;fontSize=11;" edge="1" parent="1" source="sync-workflow" target="profile-json"><mxGeometry relative="1" as="geometry" /></mxCell><mxCell id="arrow-profile-generate" value="変更検知 (push trigger)" style="edgeStyle=orthogonalEdgeStyle;rounded=0;fontSize=11;dashed=1;" edge="1" parent="1" source="profile-json" target="generate-workflow"><mxGeometry relative="1" as="geometry" /></mxCell><mxCell id="arrow-templates-generate" value="" style="edgeStyle=orthogonalEdgeStyle;rounded=0;fontSize=11;dashed=1;" edge="1" parent="1" source="templates" target="generate-workflow"><mxGeometry relative="1" as="geometry" /></mxCell><mxCell id="arrow-generate-readme" value="生成・コミット" style="edgeStyle=orthogonalEdgeStyle;rounded=0;fontSize=11;" edge="1" parent="1" source="generate-workflow" target="readme-md"><mxGeometry relative="1" as="geometry" /></mxCell><mxCell id="arrow-generate-docs" value="生成・コミット" style="edgeStyle=orthogonalEdgeStyle;rounded=0;fontSize=11;" edge="1" parent="1" source="generate-workflow" target="docs-html"><mxGeometry relative="1" as="geometry" /></mxCell><mxCell id="arrow-repo-pages" value="GitHub Pages deploy" style="edgeStyle=orthogonalEdgeStyle;rounded=0;fontSize=11;" edge="1" parent="1" source="docs-html" target="pages"><mxGeometry relative="1" as="geometry" /></mxCell><mxCell id="arrow-dev-sheets" value="スプレッドシート編集" style="edgeStyle=orthogonalEdgeStyle;rounded=0;fontSize=11;" edge="1" parent="1" source="developer" target="sheets"><mxGeometry relative="1" as="geometry" /></mxCell><mxCell id="arrow-visitor-pages" value="閲覧" style="edgeStyle=orthogonalEdgeStyle;rounded=0;fontSize=11;" edge="1" parent="1" source="visitor" target="pages"><mxGeometry relative="1" as="geometry" /></mxCell></root></mxGraphModel></diagram></mxfile>`;

      var frame = document.getElementById('diagram-frame');

      globalThis.addEventListener('message', function (evt) {
        if (evt.origin !== 'https://embed.diagrams.net') return;
        var msg = JSON.parse(evt.data);
        if (msg.event === 'init') {
          frame.contentWindow.postMessage(JSON.stringify({
            action: 'load',
            xml: diagramXml,
            autoresize: true
          }), 'https://embed.diagrams.net');
        }
      });
    </script>
</body>
</html>
