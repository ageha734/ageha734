services:
  cv-api:
    build:
      context: ./cv-api
      dockerfile: Dockerfile
    environment:
      HMAC_SECRET: e2e-test-secret
      PORT: 3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 2s
      timeout: 5s
      retries: 10

  sync:
    build:
      context: ./mocks/sync
      dockerfile: Dockerfile
    ports:
      - "14000:14000"
    environment:
      GAS_API_URL: http://cv-api:3000
      GAS_HMAC_SECRET: e2e-test-secret
      SYNC_STEPS: sync-from-gas:npx tsx /workspace/scripts/sync-from-gas.ts,generate-portfolio:npx tsx /workspace/scripts/generate-portfolio.ts
    depends_on:
      cv-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:14000/health"]
      interval: 2s
      timeout: 5s
      retries: 10

  portfolio:
    image: node@sha256:968df39aedcea65eeb078fb336ed7191baf48f972b4479711397108be0966920
    working_dir: /app
    volumes:
      - ./docs:/app/docs
    command: npx serve /app/docs -p 8080 --no-clipboard
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 2s
      timeout: 5s
      retries: 10

  e2e:
    build:
      context: ./e2e
      dockerfile: Dockerfile
    depends_on:
      cv-api:
        condition: service_healthy
      sync:
        condition: service_healthy
      portfolio:
        condition: service_healthy
    environment:
      GAS_HMAC_SECRET: e2e-test-secret
      GAS_API_URL: http://cv-api:3000
      SYNC_SERVER_URL: http://sync:14000
      PORTFOLIO_URL: http://portfolio:8080
