services:
  cv-api:
    build:
      context: ./cv-api
      dockerfile: Dockerfile
    environment:
      HMAC_SECRET: e2e-test-secret
      PORT: 3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 2s
      timeout: 5s
      retries: 10

  sync:
    build:
      context: ./mocks/sync
      dockerfile: Dockerfile
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "14000:14000"
      - "2121:2121"
      - "40000-40010:40000-40010"
    environment:
      GAS_API_URL: http://cv-api:3000
      GAS_HMAC_SECRET: e2e-test-secret
      SYNC_STEPS: sync-from-gas:npx tsx /workspace/scripts/sync-from-gas.ts,generate-portfolio:sh -c 'npm install --prefix /workspace --omit=dev --ignore-scripts && npx tsx /workspace/scripts/generate-portfolio.ts'
    depends_on:
      cv-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:14000/health"]
      interval: 2s
      timeout: 5s
      retries: 10

  setup:
    image: alpine@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
    profiles: [setup]
    depends_on:
      sync:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - .:/workspace
    entrypoint: [sh, -c]
    command:
      - |
        apk add --no-cache curl=8.19.0-r0 &&
        curl -T /workspace/scripts/sync-from-gas.ts "ftp://syncuser:syncpass@sync:2121/scripts/sync-from-gas.ts" --ftp-create-dirs &&
        curl -T /workspace/scripts/generate-portfolio.ts "ftp://syncuser:syncpass@sync:2121/scripts/generate-portfolio.ts" --ftp-create-dirs &&
        curl -T /workspace/data/profile.json "ftp://syncuser:syncpass@sync:2121/data/profile.json" --ftp-create-dirs &&
        curl -T /workspace/templates/portfolio.html.mustache "ftp://syncuser:syncpass@sync:2121/templates/portfolio.html.mustache" --ftp-create-dirs &&
        curl -T /workspace/package.json "ftp://syncuser:syncpass@sync:2121/package.json"

  portfolio:
    image: node@sha256:968df39aedcea65eeb078fb336ed7191baf48f972b4479711397108be0966920
    working_dir: /app
    volumes:
      - ./docs:/app/docs
    command: npx serve /app/docs -p 8080 --no-clipboard
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 2s
      timeout: 5s
      retries: 10

  e2e:
    build:
      context: ./e2e
      dockerfile: Dockerfile
    depends_on:
      cv-api:
        condition: service_healthy
      sync:
        condition: service_healthy
      portfolio:
        condition: service_healthy
    environment:
      GAS_HMAC_SECRET: e2e-test-secret
      GAS_API_URL: http://cv-api:3000
      SYNC_SERVER_URL: http://sync:14000
      PORTFOLIO_URL: http://portfolio:8080
      GH_TOKEN: ${GH_TOKEN:-}
      GITHUB_REPOSITORY: ${GITHUB_REPOSITORY:-}
