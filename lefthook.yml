pre-commit:
  piped: true
  commands:
    check:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: |
        pnpx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true
    markdownlint:
      glob: "*.md"
      run: |
        npx markdownlint-cli2 --fix {staged_files} || true
      stage_fixed: true
    gitleaks:
      run: gitleaks protect --staged --config .gitleaks.toml --no-banner

prepare-commit-msg:
  commands:
    commitizen:
      interactive: true
      run: |
        exec < /dev/tty && pnpx cz --hook || true

commit-msg:
  commands:
    commitlint:
      run: |
        pnpx commitlint --edit {1}

pre-push:
  commands:
    validate-profile:
      glob: "data/profile.json"
      run: pnpm validate:profile
    validate-templates:
      glob: "{templates/**,data/**}"
      run: pnpm validate:templates

post-merge:
  commands:
    pnpm:
      glob: "{package.json,package-lock.json}"
      run: pnpm install --frozen-lockfile
