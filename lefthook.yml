pre-commit:
  piped: true
  commands:
    biome:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: docker compose -f compose.ci.yaml run --rm --no-deps biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
    markdownlint:
      glob: "*.md"
      run: docker compose -f compose.ci.yaml run --rm --no-deps markdownlint --fix {staged_files} || true
      stage_fixed: true
    textlint:
      glob: "*.ja.md"
      run: docker compose -f compose.ci.yaml run --rm --no-deps textlint {staged_files} || true
    gitleaks:
      run: docker compose -f compose.ci.yaml run --rm --no-deps gitleaks protect --staged --config .gitleaks.toml --no-banner

pre-push:
  commands:
    validate-profile:
      glob: "data/profile.json"
      run: pnpm validate:profile
    validate-templates:
      glob: "{templates/**,data/**}"
      run: pnpm validate:templates

post-merge:
  commands:
    pnpm:
      glob: "{package.json,pnpm-lock.yaml}"
      run: pnpm install --frozen-lockfile
